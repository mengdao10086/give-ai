name: Build APK + C Daemon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: 编译 LSPosed 模块 APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lsp模块（apk修复+温控接口）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 授权 gradlew
        run: chmod +x gradlew

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LSPosed-Module-APK
          path: lsp模块（apk修复+温控接口）/app/build/outputs/apk/release/*.apk

  build-c:
    name: 编译 C 智能温控守护程序
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r27c

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          mv android-ndk-${NDK_VERSION} /opt/ndk
          echo "NDK installed at /opt/ndk"
          ls /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android* | head -5

      - name: 编译 tempctrl（ARM64 Android）
        run: |
          set -x
          TOOLCHAIN=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64
          CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          echo "Compiler: $CC"
          $CC --version
          # 先试非静态编译，捕获错误
          $CC -O2 -o tempctrl 智能温控脚本/tempctrl.c 2>&1 || true
          echo "=== 非静态编译结果 ==="
          ls -la tempctrl 2>/dev/null && file tempctrl || echo "非静态编译失败"
          # 再试静态编译
          $CC -static -O2 -o tempctrl_static 智能温控脚本/tempctrl.c 2>&1
          echo "=== 静态编译结果 ==="
          ls -la tempctrl_static 2>/dev/null && file tempctrl_static || echo "静态编译失败"
          # 选一个成功的
          if [ -f tempctrl_static ]; then
            cp tempctrl_static tempctrl
          elif [ -f tempctrl ]; then
            echo "warning: using non-static binary"
          else
            echo "both compilations failed" >&2
            exit 1
          fi
          echo "=== 编译成功 ==="
          file tempctrl
          ls -lh tempctrl

      - name: 修复 PT_TLS 对齐（Android Bionic 兼容）
        run: |
          python3 智能温控脚本/patch_tls.py tempctrl

      - name: 验证编译产物
        run: |
          file tempctrl
          ls -lh tempctrl

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: tempctrl-daemon
          path: tempctrl
