name: Build APK + C Daemon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: 编译 LSPosed 模块 APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lsp模块（apk修复+温控接口）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 授权 gradlew
        run: chmod +x gradlew

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LSPosed-Module-APK
          path: lsp模块（apk修复+温控接口）/app/build/outputs/apk/release/*.apk

  build-c:
    name: 编译 C 智能温控守护程序
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" 2>&1 | tail -5
          echo "=== 查找 NDK ==="
          find $ANDROID_SDK_ROOT/ndk -name "aarch64-linux-android21-clang" 2>/dev/null || echo "NOT FOUND"
          ls -la $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo "no ndk dir"

      - name: 编译 tempctrl
        run: |
          set -x
          NDK=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 2 -type d | sort -V | tail -1)
          echo "NDK dir: $NDK"
          if [ -z "$NDK" ] || [ "$NDK" = "$ANDROID_SDK_ROOT/ndk" ]; then
            # 手动探测
            NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/*/ 2>/dev/null | sort -V | tail -1)
            echo "NDK fallback: $NDK"
          fi
          echo "NDK_HOME=$NDK"
          ls -la "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -20
          CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          echo "CC=$CC"
          if [ ! -f "$CC" ]; then exit 1; fi
          $CC -O2 -o tempctrl 智能温控脚本/tempctrl.c
          echo "=== 编译成功 ==="
          file tempctrl

      - name: 修复 PT_TLS 对齐
        run: python3 智能温控脚本/patch_tls.py tempctrl

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: tempctrl-daemon
          path: tempctrl*
