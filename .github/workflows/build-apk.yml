name: Build APK + C Daemon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: 编译 LSPosed 模块 APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lsp模块（apk修复+温控接口）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 授权 gradlew
        run: chmod +x gradlew

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LSPosed-Module-APK
          path: lsp模块（apk修复+温控接口）/app/build/outputs/apk/release/*.apk

  build-c:
    name: 编译 C 智能温控守护程序
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 先验证 C 代码在 Linux 上能编译（方便看错误信息）
      - name: 验证 C 代码语法（x86_64 Linux）
        run: |
          which gcc || (sudo apt-get update -qq && sudo apt-get install -y -qq gcc)
          echo "=== GCC installed ==="
          gcc --version
          gcc -O2 -o tempctrl_x64 智能温控脚本/tempctrl.c
          echo "=== x86_64 编译成功 ==="
          file tempctrl_x64

      # Android NDK 交叉编译 ARM64
      - name: 设置 Android NDK
        id: ndk_setup
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: 编译 ARM64 二进制
        run: |
          echo "=== NDK_PATH: ${{ steps.ndk_setup.outputs.ndk-path }} ==="
          ls -la "${{ steps.ndk_setup.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -10
          CC="${{ steps.ndk_setup.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          echo "CC=$CC"
          $CC --version
          $CC -O2 -o tempctrl 智能温控脚本/tempctrl.c
          echo "=== ARM64 编译成功 ==="
          file tempctrl
          ls -lh tempctrl

      - name: 修复 PT_TLS 对齐
        run: python3 智能温控脚本/patch_tls.py tempctrl

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: tempctrl-daemon
          path: tempctrl*
