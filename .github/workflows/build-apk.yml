name: Build APK + C Daemon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: 编译 LSPosed 模块 APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lsp模块（apk修复+温控接口）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 授权 gradlew
        run: chmod +x gradlew

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LSPosed-Module-APK
          path: lsp模块（apk修复+温控接口）/app/build/outputs/apk/release/*.apk

  build-c:
    name: 编译 C 智能温控守护程序
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q -o android-ndk-r27c-linux.zip
          rm -rf /opt/ndk 2>/dev/null; mv android-ndk-r27c /opt/ndk
          echo "OK: $(ls /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android* | wc -l) ARM64 tools"

      - name: 编译 tempctrl
        run: |
          set +e
          CC=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          $CC --version > /dev/null 2>&1
          # 编译，错误输出到文件，不中断脚本
          $CC -O2 -o tempctrl 智能温控脚本/tempctrl.c > compile_ok.txt 2>compile_err.txt
          RC=$?
          echo "=== exit code: $RC ==="
          echo "=== stdout ==="
          cat compile_ok.txt
          echo "=== stderr ==="
            cat compile_err.txt
          if [ $RC -ne 0 ] || [ ! -f tempctrl ]; then
            echo "COMPILATION FAILED"
            exit 1
          fi
          echo "=== OK ==="
          file tempctrl

      - name: 上传编译日志（即使失败）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-logs
          path: compile_*.txt
          if-no-files-found: ignore

      - name: 修复 PT_TLS 对齐
        run: python3 智能温控脚本/patch_tls.py tempctrl || echo "TLS patch skipped (not needed)"

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: tempctrl-daemon
          path: tempctrl
