name: Build APK + C Daemon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: 编译 LSPosed 模块 APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lsp模块（apk修复+温控接口）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 授权 gradlew
        run: chmod +x gradlew

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LSPosed-Module-APK
          path: lsp模块（apk修复+温控接口）/app/build/outputs/apk/release/*.apk

  build-c:
    name: 编译 C 智能温控守护程序
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: 编译 tempctrl（ARM64 Android 静态链接）
        run: |
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          echo "Toolchain: $TOOLCHAIN"
          ls "$TOOLCHAIN/bin/" | head -10
          CC="$TOOLCHAIN/bin/aarch64-linux-android21-clang"
          echo "Compiler: $CC"
          $CC -static -O2 -o tempctrl 智能温控脚本/tempctrl.c
          echo "=== 编译成功 ==="
          file tempctrl
          ls -lh tempctrl

      - name: 修复 PT_TLS 对齐（Android Bionic 兼容）
        run: |
          python3 智能温控脚本/patch_tls.py tempctrl

      - name: 验证编译产物
        run: |
          file tempctrl
          ls -lh tempctrl

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: tempctrl-daemon
          path: tempctrl
