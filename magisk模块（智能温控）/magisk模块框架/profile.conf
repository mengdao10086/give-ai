# ============================================================
# 飞智 B6X 增强计划 — 智能温控配置文件
# ============================================================
# 格式：KEY=VALUE（等号两边不要多余空格）
# "#" 开头的行为注释，空行自动跳过
#
# 修改后无需重启 daemon，下一轮 5 秒循环会自动检测并重载
# ============================================================

# ======================== 电池温度控制 ========================

# 基准温度（0.1°C 精度，350 = 35.0°C）
# 电池温度与此值比较计算偏差，高于此值升档（加强散热），低于此值降档
BATT_BASELINE=350

# 第一区间阈值（0.1°C 精度，7 = 0.7°C）
# |偏差| ≤ 此值 → 不调整（死区），避免温度小幅波动导致频繁换挡
BATT_ZONE_1=7

# 第二区间阈值（0.1°C 精度，20 = 2.0°C）
# BATT_ZONE_1 < |偏差| ≤ BATT_ZONE_2 → ±1 档
# |偏差| > BATT_ZONE_2 → ±2 档
BATT_ZONE_2=20

# ======================== CPU 紧急干预 ========================
# CPU 加权温度超过以下阈值时触发紧急等级，强制最低档位
# 注意：这些值是 0.1°C 精度，如 850 = 85.0°C

# 紧急等级 3 触发温度（>此值时强制 EMERG_FORCED_3 档）
CPU_EMERG_3=850

# 紧急等级 2 触发温度（>此值时强制 EMERG_FORCED_2 档）
CPU_EMERG_2=750

# 紧急等级 1 触发温度（>此值时强制 EMERG_FORCED_1 档）
CPU_EMERG_1=650

# 以下为降温恢复阈值，带 10°C 滞回防止频繁跳变：

# 清除所有紧急（温度低于此值 → 紧急等级归零）
CPU_RECOVER_0=550

# 从等级 ≥2 降为等级 1（温度低于此值且当前等级 ≥2）
CPU_RECOVER_1=650

# 从等级 ≥3 降为等级 2（温度低于此值且当前等级 ≥3）
CPU_RECOVER_2=750

# ======================== 紧急强制最低档位 ========================
# 各紧急等级下允许的最低档位，等级越高档位越高

# 紧急等级 1 时的最低档位（智能 16°C / 4000RPM）
EMERG_FORCED_1=5

# 紧急等级 2 时的最低档位（智能 14°C / 5100RPM）
EMERG_FORCED_2=7

# 紧急等级 3 时的最低档位（智能 12°C / 5800RPM）
EMERG_FORCED_3=9

# ======================== 冷却期 ========================

# 每次档位调整后的冷却周期数（每周期约 5 秒）
# 冷却期内不执行电池温度升降档，防止快速振荡
# 4 周期 ≈ 20 秒
COOLDOWN_CYCLES=4

# ======================== 断联超时重置 ========================

# BLE 断联超过此秒数后重连 → 重置所有状态（视为新开机）
# 重置后重新读取电池温度计算初始档位
DISCONNECT_RESET_SEC=60

# ======================== CPU 滤波系数 ========================

# CPU 一阶低通滤波系数（百分比，0~100）
# 计算公式：weighted = raw × ALPHA% + old × (100-ALPHA)%
# 值越大越跟踪原始值（响应快但波动大），值越小越平滑（响应慢但稳定）
# 默认 25（=α=0.25）—— 适合 5 秒循环周期的折中值
CPU_FILTER_ALPHA=25

# ======================== 日志 ========================

# 日志文件路径（需位于可写目录）
LOG_FILE=/cache/tempctrl.log
