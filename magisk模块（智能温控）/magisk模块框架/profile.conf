# 飞智 B6X 增强计划 — 智能温控配置
# 格式：KEY=VALUE（等号两边不要空格），#开头为注释，空行自动跳过
# 修改后无需重启 daemon，下一轮 5 秒循环自动热重载
#
# 全局说明：所有温度值的单位都是 0.1°C
#   例：350 = 35.0°C，850 = 85.0°C，7 = 0.7°C

## 电池温度控制

# 基准温度，电池温度与此值比较算偏差
BATT_BASELINE=350

# 第一区间阈值，|偏差|≤此值时不调整（死区），避免小幅波动频繁换挡
BATT_ZONE_1=7

# 第二区间阈值
# 死区<|偏差|≤此值 → ±1 档，|偏差|>此值 → ±2 档
BATT_ZONE_2=20

## CPU 紧急干预

# CPU 加权温度超过以下阈值时触发紧急等级，强制最低档位

CPU_EMERG_3=850    # >此值 → 紧急等级 3
CPU_EMERG_2=750    # >此值 → 紧急等级 2
CPU_EMERG_1=650    # >此值 → 紧急等级 1

# 降温恢复阈值，带 10°C 滞回防止频繁跳变
CPU_RECOVER_0=550  # 低于此值 → 清除所有紧急
CPU_RECOVER_1=650  # 低于此值且当前≥2级 → 降为 1
CPU_RECOVER_2=750  # 低于此值且当前≥3级 → 降为 2

## 紧急强制最低档位

EMERG_FORCED_1=5   # 紧急 1（>65°C）时的最低档
EMERG_FORCED_2=7   # 紧急 2（>75°C）时的最低档
EMERG_FORCED_3=9   # 紧急 3（>85°C）时的最低档

## 冷却期

# 每次档位调整后的冷却周期数（每周期≈5秒），期内不执行电池升降档
COOLDOWN_CYCLES=4

## 断联超时重置

# BLE 断开超过此秒数后重连 → 重置所有状态（视为新开机）
DISCONNECT_RESET_SEC=60

## CPU 滤波系数

# 一阶低通滤波（百分比，0~100），越大越跟原始值，越小越平滑
# weighted = raw×ALPHA% + old×(100-ALPHA)%
CPU_FILTER_ALPHA=25

## 日志

LOG_FILE=/cache/tempctrl.log
