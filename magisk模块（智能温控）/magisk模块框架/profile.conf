# 飞智 B6X 增强计划 — 智能温控配置
# 格式：KEY=VALUE（等号两边不要空格），#开头为注释，空行自动跳过
# 修改后无需重启 daemon，下一轮 5 秒循环自动热重载
#
# 全局说明：所有温度值的单位都是 0.1°C
#   例：350 = 35.0°C，850 = 85.0°C，7 = 0.7°C

## 电池温度控制

# 基准温度，电池温度与此值比较算偏差
BATT_BASELINE=350

# 第一区间阈值，|偏差|≤此值时不调整（死区），避免小幅波动频繁换挡
BATT_ZONE_1=7

# 第二区间阈值
# 死区<|偏差|≤此值 → ±1 档，|偏差|>此值 → ±2 档
BATT_ZONE_2=20

## CPU 紧急干预

# CPU 加权温度超过以下阈值时触发紧急等级，强制最低档位

CPU_EMERG_3=850    # >此值 → 紧急等级 3
CPU_EMERG_2=750    # >此值 → 紧急等级 2
CPU_EMERG_1=650    # >此值 → 紧急等级 1

# 降温恢复阈值，带 10°C 滞回防止频繁跳变
CPU_RECOVER_0=550  # 低于此值 → 清除所有紧急
CPU_RECOVER_1=650  # 低于此值且当前≥2级 → 降为 1
CPU_RECOVER_2=750  # 低于此值且当前≥3级 → 降为 2

## 紧急强制最低档位

EMERG_FORCED_1=5   # 紧急 1（>65°C）时的最低档
EMERG_FORCED_2=7   # 紧急 2（>75°C）时的最低档
EMERG_FORCED_3=9   # 紧急 3（>85°C）时的最低档

## 冷却期（仅 CPU 紧急使用，电池升降档已不检查冷却）

# 每次 CPU 紧急等级变化后的冷却周期数（每周期≈5秒）
COOLDOWN_CYCLES=4

## 断联超时重置

# BLE 断开超过此秒数后重连 → 重置所有状态（视为新开机）
DISCONNECT_RESET_SEC=60

## CPU 滤波系数

# 一阶低通滤波（百分比，0~100），越大越跟原始值，越小越平滑
# weighted = raw×ALPHA% + old×(100-ALPHA)%
CPU_FILTER_ALPHA=20

## 趋势豁免上限

# 温度趋势反向时最多连续豁免次数（0=关闭豁免，20=最大）
# 超过此次数后强制执行升降档，防止温度长期偏离不响应
OVERRIDE_MAX=8

## 峰值过冲抑制

# PEAK_DAMP_THRESHOLD: 2°C 外趋势豁免触发阈值（0.1°C）
#   超过基准 2°C 时，趋势反向且变动 > 此值才豁免
PEAK_DAMP_THRESHOLD=3

# PEAK_DAMP_INNER_THRESHOLD: 2°C 内反补触发阈值（0.1°C）
#   基准 2°C 内，单次变动 > 此值 → 反补 PEAK_DAMP_INNER_ADJUST 档
PEAK_DAMP_INNER_THRESHOLD=5

# PEAK_DAMP_INNER_ADJUST: 2°C 内反补档位数
PEAK_DAMP_INNER_ADJUST=2

# PEAK_DAMP_OUTER_THRESHOLD: 2°C 外反补触发阈值（0.1°C）
#   基准 2°C 外，单次变动 > 此值 → 反补 PEAK_DAMP_OUTER_ADJUST 档
PEAK_DAMP_OUTER_THRESHOLD=3

# PEAK_DAMP_OUTER_ADJUST: 2°C 外反补档位数
PEAK_DAMP_OUTER_ADJUST=1

## 初始档位计算

# 启动时根据 (当前电池温度 - INIT_TEMP_OFFSET) / INIT_DIVISOR 计算初始档位
# 例：电池 36.0°C，INIT_TEMP_OFFSET=350，INIT_DIVISOR=10 → (360-350)/10 = 1 档
INIT_TEMP_OFFSET=350
INIT_DIVISOR=10

## 状态文件超时

# LSPosed 模块最后一次写 status 文件超过此秒数 → 判进程死
STATUS_TIMEOUT=16

## 日志

LOG_FILE=/cache/tempctrl.log
