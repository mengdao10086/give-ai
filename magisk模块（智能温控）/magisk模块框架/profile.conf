# 飞智 B6X 增强计划 — 智能温控配置
# 格式：KEY=VALUE（等号两边不要空格），# 开头为注释，空行自动跳过
# 修改后无需重启 daemon，下一轮 5 秒循环自动热重载
#
# 全局说明：所有温度值的单位都是 0.1°C
#   例：350 = 35.0°C，850 = 85.0°C，7 = 0.7°C
#
# 所有档位参数范围：0~10，0=最低功率/待机，10=满功率/制冷峰值

# [0] 配置文件总开关（必须放在第一行，预检时最先读取）
# =0：不加载以下任何参数，全部使用代码内默认值
# =1：正常加载以下所有参数
CONFIG_ENABLED=0

# [1] 电池温度控制

# 基准温度，电池温度与此值比较算偏差
BATT_BASELINE=350

# 第一区间阈值，|偏差|≤此值时不调整（死区），避免小幅波动频繁换挡
BATT_ZONE_1=7

# 第二区间阈值
# 死区 < |偏差| ≤ 此值 → ±1 档，|偏差| > 此值 → ±2 档
BATT_ZONE_2=20

# [2] 温度趋势豁免
# 温度变化方向与期望的升降档方向相反时，跳过本次调整的次数上限。
# 仅当单周期变动 ≤0.3°C（3 单位）时触发。
# 超过 2°C 区时，额外要求变动 > PEAK_DAMP_THRESHOLD 才豁免。

# 最大连续豁免次数（0=关闭豁免，20=最大）
OVERRIDE_MAX=8

# 2°C 外严格豁免触发阈值（0.1°C）
# 超过基准 2°C 时，趋势反向且变动 > 此值才豁免，否则强行执行
PEAK_DAMP_THRESHOLD=3

# [3] 峰值过冲抑制（反补）
# 单周期变动 >0.3°C 时触发，执行后本周期不再执行常规升降档。
# 2°C 内 0.3~0.5°C → 反补 1 档，>0.5°C → 反补 PEAK_DAMP_INNER_ADJUST 档
# 2°C 外 >0.3°C    → 反补 PEAK_DAMP_OUTER_ADJUST 档

# 2°C 内反补触发阈值（0.1°C），变动 > 此值 → 反补 PEAK_DAMP_INNER_ADJUST 档
PEAK_DAMP_INNER_THRESHOLD=5

# 2°C 内反补档位数
PEAK_DAMP_INNER_ADJUST=2

# 2°C 外反补触发阈值（0.1°C），变动 > 此值 → 反补 PEAK_DAMP_OUTER_ADJUST 档
PEAK_DAMP_OUTER_THRESHOLD=3

# 2°C 外反补档位数
PEAK_DAMP_OUTER_ADJUST=1

# [4] CPU 紧急干预

# CPU 加权温度超过以下阈值时触发紧急等级，强制最低档位
# >85.0°C → 紧急等级 3（强制最低 9 档）
CPU_EMERG_3=850
# >75.0°C → 紧急等级 2（强制最低 7 档）
CPU_EMERG_2=750
# >65.0°C → 紧急等级 1（强制最低 5 档）
CPU_EMERG_1=650

# 降温恢复阈值，带 10°C 滞回防止频繁跳变
# <55.0°C → 清除所有紧急
CPU_RECOVER_0=550
# <65.0°C 且当前≥2 级 → 降为 1
CPU_RECOVER_1=650
# <75.0°C 且当前≥3 级 → 降为 2
CPU_RECOVER_2=750

# 紧急强制最低档位（退出紧急时也作为档位上限）
# 等级 3 强制最低档
EMERG_FORCED_3=9
# 等级 2 强制最低档
EMERG_FORCED_2=7
# 等级 1 强制最低档
EMERG_FORCED_1=5

# CPU 温度一阶低通滤波系数（百分比，1~100）
# weighted = raw × α% + old × (100-α)%，越大越跟原始值，越小越平滑
CPU_FILTER_ALPHA=20

# [5] 断联与初始档位

# BLE 断开超过此秒数后重连 → 重置所有状态（视为新开机）
DISCONNECT_RESET_SEC=60

# 启动时根据 (当前电池温度 - INIT_TEMP_OFFSET) / INIT_DIVISOR 计算初始档位
# 例：电池 36.0°C，INIT_TEMP_OFFSET=350，INIT_DIVISOR=10 → (360-350)/10 = 1 档
INIT_TEMP_OFFSET=350
INIT_DIVISOR=10

# [6] 进程检测

# LSPosed 模块最后一次写 status 文件超过此秒数 → 判进程死
STATUS_TIMEOUT=16

# [7] 日志

# 日志文件路径（空字符串或省略则自动根据二进制名生成）
LOG_FILE=/cache/tempctrl.log

# 日志文件大小上限（KB），超限自动删除最早日志行，0=关闭日志
LOG_MAX_KB=10
